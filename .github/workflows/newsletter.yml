name: EM Weekly Digest

# Trigger: ESCLUSIVAMENTE esterno via workflow_dispatch.
# Lo scheduling è gestito da cron-job.org, che chiama l'endpoint GitHub:
#   POST https://api.github.com/repos/<owner>/<repo>/actions/workflows/newsletter.yml/dispatches
#   body: {"ref": "main"}
# cron-job.org va configurato su LUNEDÌ 13:00 ora di Roma (gestisce il fuso/DST,
# a differenza dei cron schedulati di GitHub Actions che sono solo in UTC).
# Nessuno 'schedule' qui: cosi' il workflow non viene mai disattivato per
# inattivita' e parte solo quando lo chiama cron-job.org (o un avvio manuale).
on:
  workflow_dispatch:

# Evita doppi invii se cron-job.org spara due trigger ravvicinati:
# il secondo run attende (non cancella) ma non gira in parallelo.
concurrency:
  group: newsletter-invio
  cancel-in-progress: false

jobs:
  invia-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Versioni pinnate: un breaking change delle librerie Google non deve
      # poter bloccare l'invio del lunedì. Aggiornare qui in modo controllato.
      - name: Installa dipendenze
        run: |
          pip install \
            google-auth-oauthlib==1.4.0 \
            google-auth-httplib2==0.4.0 \
            google-api-python-client==2.198.0

      - name: Esegui newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          DESTINATARI: ${{ secrets.DESTINATARI }}
        run: python newsletter_rss.py
